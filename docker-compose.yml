services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      APP_VERSION: v1.0.0
      SERVICE_NAME: backend

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:80"
    depends_on:
      - backend
